<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Seeking Sovngarde">
  <defs>
    <!-- Deep anthracite backdrop with a faint Sovngarde aurora at the top -->
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1e2a2b"/>
      <stop offset="40%" stop-color="#16191d"/>
      <stop offset="100%" stop-color="#101316"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c8a86b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8a86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Panel -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#bg)"
        stroke="#c8a86b" stroke-opacity="0.35" stroke-width="1"/>
  <circle cx="16" cy="16" r="11.5" fill="url(#glow)"/>

  <!-- Divider hairlines flanking the gem -->
  <line x1="2" y1="16" x2="6.5" y2="16" stroke="#c8a86b" stroke-opacity="0.5" stroke-width="0.9"/>
  <line x1="25.5" y1="16" x2="30" y2="16" stroke="#c8a86b" stroke-opacity="0.5" stroke-width="0.9"/>

  <!-- Faceted diamond: two tones for a cut-gem look -->
  <polygon points="16,4.5 7,16 16,27.5" fill="#e6cf98"/>
  <polygon points="16,4.5 25,16 16,27.5" fill="#b9975b"/>

  <!-- Girdle + crown facet lines -->
  <g stroke="#14171b" stroke-opacity="0.55" stroke-width="0.7" fill="none" stroke-linejoin="round">
    <line x1="7" y1="16" x2="25" y2="16"/>
    <path d="M11.4 10.8 L16 16 L20.6 10.8"/>
  </g>

  <!-- Crisp gold outline keeps the silhouette sharp at small sizes -->
  <polygon points="16,4.5 25,16 16,27.5 7,16" fill="none"
           stroke="#d9bd80" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
